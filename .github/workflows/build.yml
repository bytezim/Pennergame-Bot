name: Build PennerBot

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      name: Checkout Repository

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pyinstaller pyinstaller-hooks-contrib

    - name: Install Frontend Dependencies
      working-directory: web
      run: npm install

    - name: Build Frontend
      working-directory: web
      run: npm run build

    - name: Build EXE with PyInstaller
      run: pyinstaller pennerbot.spec --clean

    - name: Get Build Information
      id: info
      shell: bash
      run: |
        echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "sha256=$(sha256sum dist/PennerBot.exe | awk '{ print $1 }')" >> $GITHUB_OUTPUT
        echo "size=$(du -h dist/PennerBot.exe | awk '{ print $1 }')" >> $GITHUB_OUTPUT

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PennerBot-${{ steps.info.outputs.commit }}
        path: dist/PennerBot.exe
        compression-level: 9

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/PennerBot.exe
        body: |
          ## PennerBot ${{ github.ref_name }}

          ✅ Automatisch gebaut von GitHub Actions

          | Info | Wert |
          |------|------|
          | Commit | ${{ github.sha }} |
          | Dateigröße | ${{ steps.info.outputs.size }} |
          | SHA256 Hash | `${{ steps.info.outputs.sha256 }}` |

          Du kannst den Build auch selbst lokal nachbauen:
          ```powershell
          git clone https://github.com/${{ github.repository }}.git
          cd Pennergame-Bot
          .\manage.ps1 setup
          .\manage.ps1 windows-build
          ```
