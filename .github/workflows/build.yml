name: Build PennerBot
on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -e ".[dev]"
          pip install pyinstaller pyinstaller-hooks-contrib
      - name: Install Frontend Dependencies
        working-directory: web
        run: npm ci
      - name: Build Frontend
        working-directory: web
        run: npm run build
      - name: Build EXE with PyInstaller
        run: python -m PyInstaller pennerbot.spec --clean --noconfirm
      - name: Get Build Information
        id: info
        shell: pwsh
        run: |
          $commit = git rev-parse --short HEAD
          $hash = (Get-FileHash dist\PennerBot.exe -Algorithm SHA256).Hash.ToLower()
          $size = "{0:N2} MB" -f ((Get-Item dist\PennerBot.exe).Length / 1MB)
          echo "commit=$commit" >> $env:GITHUB_OUTPUT
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "size=$size" >> $env:GITHUB_OUTPUT
      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PennerBot
          path: dist/PennerBot.exe
          compression-level: 6
          retention-days: 1
      - name: Update Latest Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Aktuellster Build
          files: dist/PennerBot.exe
          make_latest: true
          generate_release_notes: false
          body: |
            ## ✅ Aktuellster PennerBot Build
            | Info | Wert |
            |------|------|
            | Commit | `${{ github.sha }}` |
            | Größe | `${{ steps.info.outputs.size }}` |
            | SHA256 | `${{ steps.info.outputs.sha256 }}` |
            📥 **Download:** Klicke einfach unten auf PennerBot.exe