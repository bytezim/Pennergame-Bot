name: Build PennerBot

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      name: Checkout Repository

    - name: Set up Python 3.11.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.9'
        cache: 'pip'
        allow-prereleases: false

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        pip install setuptools==70.0.0 wheel==0.43.0
        pip install -e ".[dev]"
        pip install pyinstaller==6.8.0 pyinstaller-hooks-contrib==2024.7

    - name: Install Frontend Dependencies
      working-directory: web
      run: npm ci

    - name: Build Frontend
      working-directory: web
      run: npm run build

    - name: Fix PyInstaller Windows Bug
      run: |
        $env:PYINSTALLER_COMPILE_BOOTLOADER = '0'
        $env:PYTHONOPTIMIZE = '2'

    - name: Build EXE with PyInstaller
      run: pyinstaller pennerbot.spec --clean --noconfirm

    - name: Verify EXE
      run: |
        if (-not (Test-Path "dist/PennerBot.exe")) {
          Write-Error "EXE wurde nicht erstellt!"
          exit 1
        }
        $size = (Get-Item "dist/PennerBot.exe").Length
        Write-Host "✅ EXE erstellt: $size Bytes"

    - name: Get Build Information
      id: info
      shell: powershell
      run: |
        $commit = git rev-parse --short HEAD
        $sha256 = (Get-FileHash dist/PennerBot.exe -Algorithm SHA256).Hash.ToLower()
        $size = [math]::Round((Get-Item dist/PennerBot.exe).Length / 1MB, 2)
        echo "commit=$commit" >> $env:GITHUB_OUTPUT
        echo "sha256=$sha256" >> $env:GITHUB_OUTPUT
        echo "size=$size MB" >> $env:GITHUB_OUTPUT

    - name: Upload EXE DIRECT (NO ZIP)
      uses: actions/upload-artifact@v3
      with:
        name: PennerBot.exe
        path: dist/PennerBot.exe

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Aktuellster Build
        files: dist/PennerBot.exe
        make_latest: true
        generate_release_notes: false
        body: |
          ## ✅ Aktuellster PennerBot Build

          | Info | Wert |
          |------|------|
          | Commit | `${{ github.sha }}` |
          | Größe | `${{ steps.info.outputs.size }}` |
          | SHA256 | `${{ steps.info.outputs.sha256 }}` |

          📥 **Download:** Klicke einfach unten auf PennerBot.exe
